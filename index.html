<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Depth Of Field Simulator</title>
    <style>html, body { margin: 0; padding: 0; overflow: hidden; }</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function(){
        var allowed = ['https://apprendre-la-photo.fr','https://www.apprendre-la-photo.fr'];
        if (window !== window.top) {
          try {
            var parentOrigin = document.referrer ? new URL(document.referrer).origin : '';
            if (parentOrigin && allowed.indexOf(parentOrigin) === -1) {
              document.getElementById('root').innerHTML =
                '<div style="text-align:center;padding:40px;font-family:sans-serif;">' +
                '<p>Cet outil est disponible sur <a href="https://apprendre-la-photo.fr">apprendre-la-photo.fr</a></p></div>';
              return;
            }
          } catch(e) {}
        }
        function sendHeight(){
          var root = document.getElementById('root');
          var h = root ? root.offsetHeight : document.documentElement.scrollHeight;
          var target = allowed[0];
          try { if (document.referrer) target = new URL(document.referrer).origin; } catch(e) {}
          window.parent.postMessage({type:'resize-iframe',height:h}, target);
        }
        if(window.ResizeObserver){new ResizeObserver(sendHeight).observe(document.getElementById('root') || document.body);}
        window.addEventListener('load',sendHeight);
        setInterval(sendHeight,500);
      })();
    </script>
  </body>
</html>
